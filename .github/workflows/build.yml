# Builds the OTFL OCI image and pushes it to ghcr.io/jhgaylor/otfl on every
# push to main. Multi-arch (amd64 + arm64) — home-cloud k3s nodes are arm64
# Apple Silicon Lima VMs, and single-arch amd64 images fail at pull with
# "no match for platform".
name: build

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/otfl

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
