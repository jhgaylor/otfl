<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OTFL list</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="wrap">
    <header class="top">
      <a class="brand" href="/"><span class="dot"></span> OTFL</a>
      <nav class="links">
        <a href="#" id="share-link">Share</a>
        <a href="/llms.txt">llms.txt</a>
        <span id="auth-slot"></span>
      </nav>
    </header>

    <div id="app">
      <p class="muted">Loading…</p>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="/auth.js"></script>
  <script>
    const $ = (s, r = document) => r.querySelector(s);
    const listId = decodeURIComponent(location.pathname.split("/")[2] || "");
    const app = $("#app");
    let state = null;
    let me = { user: null, auth_enabled: false };

    function toast(msg) {
      const t = $("#toast");
      t.textContent = msg;
      t.classList.add("show");
      clearTimeout(toast._t);
      toast._t = setTimeout(() => t.classList.remove("show"), 1600);
    }

    async function api(method, path, body) {
      const res = await fetch("/api/lists/" + listId + path, {
        method,
        headers: body ? { "content-type": "application/json" } : undefined,
        body: body ? JSON.stringify(body) : undefined,
      });
      if (res.status === 204) return null;
      return res.json();
    }

    function fmtDate(iso) {
      try { return new Date(iso).toLocaleString(); } catch { return iso; }
    }

    async function load() {
      me = await window.otflMe;
      const res = await fetch("/api/lists/" + listId);
      if (res.status === 404) {
        app.innerHTML = `
          <h1>List not found</h1>
          <p class="muted">No list exists with this id. It may have been deleted, or the link is wrong.</p>
          <p><a href="/">← Make a new one</a></p>`;
        return;
      }
      if (res.status === 401) {
        const rd = encodeURIComponent(location.pathname);
        app.innerHTML = `
          <h1>This list is private</h1>
          <p class="muted">It belongs to a signed-in OTFL user. If it's yours, sign in to open it.</p>
          ${me.auth_enabled ? `<p><a class="btnlink" href="/auth/github?rd=${rd}">Sign in with GitHub</a></p>` : ""}`;
        return;
      }
      if (res.status === 403) {
        app.innerHTML = `
          <h1>This list is private</h1>
          <p class="muted">It belongs to someone else, so you can't view it.</p>
          <p><a href="/">← Make your own</a></p>`;
        return;
      }
      state = await res.json();
      render();
    }

    function render() {
      const done = state.items.filter((i) => i.checked).length;
      const total = state.items.length;
      const ownedByMe = state.owned_by_me;
      const isOwned = !!state.owner_id;
      let badge;
      if (ownedByMe) {
        badge = '<span class="badge private">🔒 Private · only you</span>';
      } else if (isOwned) {
        badge = `<span class="badge private">🔒 Private · @${esc(state.owner.login)}</span>`;
      } else {
        badge = '<span class="badge open">🔗 Open · anyone with the link</span>';
      }

      // Claim button: signed in, list is currently anonymous.
      const canClaim = me.user && !isOwned;
      // Release button: I own it.
      const canRelease = ownedByMe;

      app.innerHTML = `
        <div class="list-head">
          <input class="list-title" id="title" value="${esc(state.title)}" />
        </div>
        <div class="meta">
          <span class="count">${done}/${total}</span> done ·
          updated ${fmtDate(state.updated_at)} · ${badge}
        </div>
        <ul class="items" id="items"></ul>
        <form class="row add-row" id="add-form">
          <input type="text" id="add-input" placeholder="Add an item…" autocomplete="off" />
          <button type="submit">Add</button>
        </form>
        <div class="footer-actions">
          <span class="small muted">id <code class="id">${esc(state.id)}</code></span>
          <span class="row">
            ${canClaim ? '<button class="ghost" id="claim">Save to my lists</button>' : ""}
            ${canRelease ? '<button class="ghost" id="release">Make public</button>' : ""}
            ${done ? '<button class="ghost" id="clear">Clear checked</button>' : ""}
            <button class="ghost" id="del">Delete list</button>
          </span>
        </div>
        ${!me.user && me.auth_enabled && !isOwned
          ? `<p class="small muted" style="margin-top:14px"><a href="/auth/github?rd=${encodeURIComponent(location.pathname)}">Sign in with GitHub</a> to save this list and make it private to you.</p>`
          : ""}`;

      const ul = $("#items");
      for (const item of state.items) ul.appendChild(itemEl(item));
      // Textareas must be in the DOM to measure scrollHeight.
      ul.querySelectorAll(".item-text").forEach(autosize);

      $("#title").addEventListener("change", async (e) => {
        await api("PATCH", "", { title: e.target.value });
        toast("Renamed");
      });

      $("#add-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const input = $("#add-input");
        const text = input.value.trim();
        if (!text) return;
        input.value = "";
        const item = await api("POST", "/items", { text });
        state.items.push(item);
        render();
        $("#add-input").focus();
      });

      const clear = $("#clear");
      if (clear) clear.addEventListener("click", async () => {
        await api("POST", "/clear-checked");
        await load();
        toast("Cleared checked items");
      });

      const claim = $("#claim");
      if (claim) claim.addEventListener("click", async () => {
        await api("POST", "/claim");
        await load();
        toast("Saved to your lists — now private");
      });

      const release = $("#release");
      if (release) release.addEventListener("click", async () => {
        if (!confirm("Make this list public? Anyone with the link will be able to view and edit it.")) return;
        await api("POST", "/release");
        await load();
        toast("List is now public");
      });

      $("#del").addEventListener("click", async () => {
        if (!confirm("Delete this entire list? This cannot be undone.")) return;
        await api("DELETE", "");
        location.href = "/";
      });
    }

    function itemEl(item) {
      const li = document.createElement("li");
      li.className = "item" + (item.checked ? " done" : "");

      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.className = "check";
      cb.checked = item.checked;
      cb.addEventListener("change", async () => {
        const updated = await api("POST", "/items/" + item.id + "/toggle");
        Object.assign(item, updated);
        li.className = "item" + (item.checked ? " done" : "");
        updateCount();
      });

      const text = document.createElement("textarea");
      text.className = "item-text";
      text.rows = 1;
      text.value = item.text;
      text.addEventListener("input", () => autosize(text));
      // Enter commits (and blurs) instead of inserting a newline; Shift+Enter
      // still adds a line break for multi-line items.
      text.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          text.blur();
        }
      });
      text.addEventListener("change", async () => {
        const v = text.value.trim();
        if (!v || v === item.text) return;
        await api("PATCH", "/items/" + item.id, { text: v });
        item.text = v;
        toast("Saved");
      });

      const del = document.createElement("button");
      del.className = "icon";
      del.title = "Delete item";
      del.textContent = "✕";
      del.addEventListener("click", async () => {
        await api("DELETE", "/items/" + item.id);
        state.items = state.items.filter((i) => i.id !== item.id);
        li.remove();
        updateCount();
      });

      li.append(cb, text, del);
      return li;
    }

    function updateCount() {
      const done = state.items.filter((i) => i.checked).length;
      const total = state.items.length;
      const c = $(".count");
      if (c) c.textContent = `${done}/${total}`;
    }

    function autosize(el) {
      el.style.height = "auto";
      el.style.height = el.scrollHeight + "px";
    }

    function esc(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
      }[c]));
    }

    $("#share-link").addEventListener("click", async (e) => {
      e.preventDefault();
      const url = location.href;
      try {
        if (navigator.share) { await navigator.share({ url }); return; }
        await navigator.clipboard.writeText(url);
        toast("Link copied");
      } catch { toast("Link copied"); }
    });

    load();
  </script>
</body>
</html>
